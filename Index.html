<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>STACKX PANEL</title>
    <!-- นำเข้าฟอนต์ Kanit เพื่อความสวยงาม -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Kanit:wght@300;400;700&display=swap" rel="stylesheet">
    
    <style>
        /* ==========================================================================
           CSS Style - STACKX โทนม่วง-ดำ (Purple & Black Theme)
           ========================================================================== */
        
        body {
            margin: 0;
            padding: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            font-family: 'Kanit', sans-serif;
            /* พื้นหลังธีมมืด */
            background: url('https://images.unsplash.com/photo-1550745165-9bc0b252726f?q=80&w=1470') no-repeat center center fixed;
            background-size: cover;
        }

        /* เลเยอร์สีดำโปร่งแสงทับพื้นหลังเพิ่มความชัดให้เมนู */
        .overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(10, 10, 12, 0.75);
            z-index: 1;
        }

        /* ตัว Panel กลางจอ */
        .panel {
            position: relative;
            z-index: 2;
            background: rgba(15, 12, 22, 0.95); /* ดำอมม่วงเข้ม */
            width: 350px;
            padding: 30px;
            border-radius: 15px;
            border: 2px solid #8a2be2; /* เส้นขอบสีม่วง (Neon Purple) */
            box-shadow: 0 0 25px rgba(138, 43, 226, 0.5); /* แสงออร่าสีม่วง */
            text-align: center;
            color: #ffffff;
            box-sizing: border-box;
        }

        h2 { 
            color: #a020f0; /* สีม่วงหลัก */
            margin-top: 0;
            margin-bottom: 25px; 
            text-transform: uppercase; 
            letter-spacing: 3px;
            font-weight: 700;
            text-shadow: 0 0 10px rgba(160, 32, 240, 0.6);
        }

        /* ส่วน Login (ระบบใช้คีย์) */
        .login-box input {
            width: 100%;
            padding: 12px;
            margin: 10px 0;
            border-radius: 6px;
            border: 1px solid #3a2a4a;
            background: #161122; /* ดำหม่นม่วง */
            color: #fff;
            outline: none;
            box-sizing: border-box;
            font-family: 'Kanit', sans-serif;
            text-align: center; /* ให้พิมพ์คีย์ตรงกลาง */
            letter-spacing: 1px;
            transition: 0.3s;
        }
        
        .login-box input:focus {
            border-color: #a020f0;
            box-shadow: 0 0 8px rgba(160, 32, 240, 0.4);
        }

        .btn-login {
            background: #8a2be2; /* ปุ่มสีม่วง */
            color: white;
            border: none;
            padding: 12px 30px;
            border-radius: 6px;
            cursor: pointer;
            font-weight: bold;
            margin-top: 15px;
            width: 100%;
            font-family: 'Kanit', sans-serif;
            text-transform: uppercase;
            transition: 0.3s;
            letter-spacing: 1px;
        }
        
        .btn-login:hover {
            background: #9932cc;
            box-shadow: 0 0 15px rgba(138, 43, 226, 0.7);
        }

        /* ส่วนเมนู (ซ่อนไว้ก่อน Login) */
        #menu-section { 
            display: none; 
        }

        .menu-item {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 15px 5px;
            border-bottom: 1px solid #2a1f3d;
            font-size: 15px;
        }
        
        .menu-item:last-child {
            border-bottom: none;
        }

        /* สวิตช์ เปิด-ปิด Custom Toggle Switch (สีม่วง) */
        .switch {
            position: relative;
            display: inline-block;
            width: 48px;
            height: 24px;
        }

        .switch input { 
            opacity: 0;
            width: 0;
            height: 0;
        }

        .slider {
            position: absolute;
            cursor: pointer;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background-color: #251c33;
            transition: .3s;
            border-radius: 24px;
            border: 1px solid #4a3568;
        }

        .slider:before {
            position: absolute;
            content: "";
            height: 16px;
            width: 16px;
            left: 3px;
            bottom: 3px;
            background-color: #9b8bb4;
            transition: .3s;
            border-radius: 50%;
        }

        input:checked + .slider {
            background-color: #8a2be2; /* เปลี่ยนเป็นสีม่วงเมื่อเปิด */
            border-color: #a020f0;
        }

        input:checked + .slider:before {
            transform: translateX(24px);
            background-color: #ffffff;
        }
        
        /* ข้อความแจ้งเตือนเมื่อคีย์ผิด */
        .error-msg {
            color: #ff4444;
            font-size: 13px;
            margin-top: 10px;
            display: none;
        }
    </style>
</head>
<body>

    <!-- เลเยอร์พื้นหลังโปร่งแสง -->
    <div class="overlay"></div>

    <!-- ตัวโครง STACKX Panel -->
    <div class="panel">
        <h2>STACKX</h2>
        
        <!-- โซนที่ 1: หน้าต่างล็อกอินแบบใช้คีย์ -->
        <div id="login-section" class="login-box">
            <input type="text" id="access-key" placeholder="กรอกคีย์ของคุณ (ENTER KEY)" autocomplete="off">
            <button class="btn-login" onclick="checkKey()">ยืนยันคีย์</button>
            <div id="error-message" class="error-msg">คีย์ไม่ถูกต้อง หรือหมดอายุ!</div>
        </div>

        <!-- โซนที่ 2: หน้าต่างเมนูฟังก์ชัน (จะแสดงเมื่อคีย์ถูกต้อง) -->
        <div id="menu-section">
            
            <div class="menu-item">
                <span>ล็อกเป้าอัตโนมัติ (Aimbot)</span>
                <label class="switch">
                    <input type="checkbox" onchange="toggleFeature('Aimbot', this.checked)">
                    <span class="slider"></span>
                </label>
            </div>
            
            <div class="menu-item">
                <span>ลดแรงดีดปืน (No Recoil)</span>
                <label class="switch">
                    <input type="checkbox" onchange="toggleFeature('No Recoil', this.checked)">
                    <span class="slider"></span>
                </label>
            </div>
            
            <div class="menu-item">
                <span>แสดงสายตาตัวละคร (ESP Line)</span>
                <label class="switch">
                    <input type="checkbox" onchange="toggleFeature('ESP Line', this.checked)">
                    <span class="slider"></span>
                </label>
            </div>

            <div class="menu-item">
                <span>เพิ่มความเร็ว (Speed Move)</span>
                <label class="switch">
                    <input type="checkbox" onchange="toggleFeature('Speed Move', this.checked)">
                    <span class="slider"></span>
                </label>
            </div>
            
        </div>
    </div>

    <!-- ==========================================================================
       JavaScript ระบบควบคุมหน้าต่างและคีย์
       ========================================================================== */ -->
    <script>
        // ฟังก์ชันตรวจสอบคีย์ (ตั้งค่าคีย์สำหรับทดสอบไว้คือ STACKX-FREE)
        function checkKey() {
            var inputKey = document.getElementById("access-key").value.trim();
            var errorMsg = document.getElementById("error-message");

            // สามารถเปลี่ยนคีย์ที่ต้องการให้ผ่านตรงเงื่อนไขนี้ได้เลยครับ
            if (inputKey === "STACKX-FREE" || inputKey === "admin") {
                // ซ่อนหน้ากรอกคีย์ แล้วเปิดหน้าเมนูฟังก์ชัน
                document.getElementById("login-section").style.display = "none";
                document.getElementById("menu-section").style.display = "block";
            } else {
                // แสดงข้อความเตือนเมื่อคีย์ไม่ตรง
                errorMsg.style.display = "block";
                errorMsg.innerText = "คีย์ไม่ถูกต้อง! (ลองใช้: STACKX-FREE)";
            }
        }

        // ฟังก์ชันเก็บสถานะการเปิด-ปิดเมนู
        function toggleFeature(featureName, isChecked) {
            if (isChecked) {
                console.log("STACKX -> " + featureName + ": [ON]");
            } else {
                console.log("STACKX -> " + featureName + ": [OFF]");
            }
        }
    </script>

</body>
</html>
