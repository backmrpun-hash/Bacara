<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ANDA PANEL FF</title>
    <!-- นำเข้าฟอนต์ Kanit เพื่อความสวยงาม -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Kanit:wght@300;400;700&display=swap" rel="stylesheet">
    
    <style>
        /* ==========================================================================
           CSS Style (ปรับปรุงจากที่ให้มาเพื่อความสมบูรณ์และรองรับ Responsive)
           ========================================================================== */
        
        /* ตั้งค่าพื้นหลังภาพหมาสีดำ (เปลี่ยนลิงก์รูปให้เห็นภาพชัดเจนขึ้น) */
        body {
            margin: 0;
            padding: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            font-family: 'Kanit', sans-serif;
            background: url('https://images.unsplash.com/photo-1518717758536-85ae29035b6d?q=80&w=1470') no-repeat center center fixed;
            background-size: cover;
        }

        /* เลเยอร์สีดำโปร่งแสงทับพื้นหลังเพื่อให้เห็นเมนูชัดขึ้น */
        .overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.7);
            z-index: 1;
        }

        /* ตัว Panel กลางจอ */
        .panel {
            position: relative;
            z-index: 2;
            background: rgba(20, 20, 20, 0.95);
            width: 350px;
            padding: 30px;
            border-radius: 15px;
            border: 2px solid #ff0000;
            box-shadow: 0 0 25px rgba(250, 0, 0, 0.6);
            text-align: center;
            color: white;
            box-sizing: border-box;
        }

        h2 { 
            color: #ff0000; 
            margin-top: 0;
            margin-bottom: 20px; 
            text-transform: uppercase; 
            letter-spacing: 2px;
        }

        /* ส่วน Login */
        .login-box input {
            width: 100%;
            padding: 12px;
            margin: 10px 0;
            border-radius: 5px;
            border: 1px solid #444;
            background: #222;
            color: #fff;
            outline: none;
            box-sizing: border-box;
            font-family: 'Kanit', sans-serif;
        }
        
        .login-box input:focus {
            border-color: #ff0000;
        }

        .btn-login {
            background: #ff0000;
            color: white;
            border: none;
            padding: 12px 30px;
            border-radius: 5px;
            cursor: pointer;
            font-weight: bold;
            margin-top: 15px;
            width: 100%;
            font-family: 'Kanit', sans-serif;
            text-transform: uppercase;
            transition: 0.3s;
        }
        
        .btn-login:hover {
            background: #cc0000;
            box-shadow: 0 0 10px rgba(255, 0, 0, 0.5);
        }

        /* ส่วนเมนู (ซ่อนไว้ก่อน Login) */
        #menu-section { 
            display: none; 
        }

        .menu-item {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 15px 5px;
            border-bottom: 1px solid #333;
        }
        
        .menu-item:last-child {
            border-bottom: none;
        }

        /* สวิตช์ เปิด-ปิด Custom Toggle Switch */
        .switch {
            position: relative;
            display: inline-block;
            width: 50px;
            height: 24px;
        }

        .switch input { 
            opacity: 0;
            width: 0;
            height: 0;
        }

        .slider {
            position: absolute;
            cursor: pointer;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background-color: #333;
            transition: .4s;
            border-radius: 24px;
        }

        .slider:before {
            position: absolute;
            content: "";
            height: 16px;
            width: 16px;
            left: 4px;
            bottom: 4px;
            background-color: white;
            transition: .4s;
            border-radius: 50%;
        }

        input:checked + .slider {
            background-color: #ff0000;
        }

        input:checked + .slider:before {
            transform: translateX(26px);
        }
        
        /* ข้อความแจ้งเตือนข้อผิดพลาด */
        .error-msg {
            color: #ff3333;
            font-size: 14px;
            margin-top: 10px;
            display: none;
        }
    </style>
</head>
<body>

    <!-- เลเยอร์พื้นหลังโปร่งแสง -->
    <div class="overlay"></div>

    <!-- ตัวโครง Panel -->
    <div class="panel">
        <h2>ANDA PANEL FF</h2>
        
        <!-- โซนที่ 1: หน้าต่างล็อกอิน -->
        <div id="login-section" class="login-box">
            <input type="text" id="username" placeholder="ชื่อผู้ใช้งาน (Username)" autocomplete="off">
            <input type="password" id="password" placeholder="รหัสผ่าน (Password)">
            <button class="btn-login" onclick="checkLogin()">เข้าสู่ระบบ</button>
            <div id="error-message" class="error-msg">ชื่อผู้ใช้หรือรหัสผ่านไม่ถูกต้อง!</div>
        </div>

        <!-- โซนที่ 2: หน้าต่างเมนู (จะแสดงหลังจาก Login สำเร็จ) -->
        <div id="menu-section">
            
            <div class="menu-item">
                <span>ล็อกเป้า (Aimbot 100%)</span>
                <label class="switch">
                    <input type="checkbox" onchange="toggleFeature('Aimbot', this.checked)">
                    <span class="slider"></span>
                </label>
            </div>
            
            <div class="menu-item">
                <span>ลดแรงดีด (No Recoil)</span>
                <label class="switch">
                    <input type="checkbox" onchange="toggleFeature('No Recoil', this.checked)">
                    <span class="slider"></span>
                </label>
            </div>
            
            <div class="menu-item">
                <span>มองทะลุ (ESP Wallhack)</span>
                <label class="switch">
                    <input type="checkbox" onchange="toggleFeature('ESP', this.checked)">
                    <span class="slider"></span>
                </label>
            </div>

            <div class="menu-item">
                <span>ความเร็วสูง (Speed Hack)</span>
                <label class="switch">
                    <input type="checkbox" onchange="toggleFeature('Speed Hack', this.checked)">
                    <span class="slider"></span>
                </label>
            </div>
            
        </div>
    </div>

    <!-- ==========================================================================
       JavaScript ระบบควบคุมการทำงาน
       ========================================================================== */ -->
    <script>
        // ฟังก์ชันเช็คการล็อกอิน (ตั้งค่า Mockup ไว้เป็น admin / 1234)
        function checkLogin() {
            var user = document.getElementById("username").value;
            var pass = document.getElementById("password").value;
            var errorMsg = document.getElementById("error-message");

            // ตั้งค่า ID และ Password สำหรับทดสอบตรงนี้ได้เลยครับ
            if (user === "admin" && pass === "1234") {
                // ซ่อนหน้า Login และแสดงหน้าเมนูแทน
                document.getElementById("login-section").style.display = "none";
                document.getElementById("menu-section").style.display = "block";
            } else {
                // แสดงข้อความเตือนเมื่อรหัสผิด
                errorMsg.style.display = "block";
                errorMsg.innerText = "รหัสผ่านไม่ถูกต้อง! (ลองใช้ admin / 1234)";
            }
        }

        // ฟังก์ชันตรวจจับการเปิด-ปิดสวิตช์ในเมนู
        function toggleFeature(featureName, isChecked) {
            if (isChecked) {
                console.log(featureName + " Status: เปิดใช้งาน (ON)");
                // สามารถเขียนคำสั่งเชื่อมต่อไปยัง API หรือ Injector ของเกมต่อตรงนี้ได้
            } else {
                console.log(featureName + " Status: ปิดใช้งาน (OFF)");
            }
        }
    </script>

</body>
</html>
